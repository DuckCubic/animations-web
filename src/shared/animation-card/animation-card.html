<div
  class="relative overflow-hidden bg-black dark:bg-white w-[300px] h-[150px] rounded-xl flex items-center justify-center"
  (mousemove)="voronoiCanvas.tiggerImpact($event.offsetX, $event.offsetY)"
  (mouseleave)="voronoiCanvas.triggerResetoration()"
>
  <app-voronoi-canvas #voronoiCanvas [density]="30" [shatterForce]="8"> </app-voronoi-canvas>
  <div class="relative z-10 pointer-events-none">
    <button
      class="bg-white text-black dark:bg-black dark:text-white px-6 py-2 rounded-lg font-bold"
      type="button"
    >
      Accept
    </button>
  </div>
</div>
