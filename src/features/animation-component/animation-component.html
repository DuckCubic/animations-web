<div class="relative min-h-screen bg-black pt-32 pb-20 px-4 md:px-8">
  <div
    class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[300px] bg-[#9B30FF]/10 rounded-full blur-[100px] pointer-events-none z-0"
  ></div>

  <div class="relative z-10 max-w-7xl mx-auto">
    <div class="text-center mb-16 space-y-4">
      <h2
        class="font-cinzel text-3xl md:text-5xl text-white tracking-[0.2em] drop-shadow-[0_0_15px_rgba(147,112,219,0.4)]"
      >
        ARCHIVO DE ANIMACIONES
      </h2>
      <p class="text-[#9370DB] font-light tracking-widest text-sm md:text-base">
        Interactúa con la materia geométrica
      </p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 auto-rows-[300px]">
      @for (item of items; track item.id) {
        @if (item.type === 'stained-glass') {
          <div
            [class]="item.size === 'large' ? 'md:col-span-2 md:row-span-2' : ''"
            class="relative overflow-hidden w-full h-full rounded-xl border border-[#9B30FF]/30 group cursor-pointer hover:scale-[1.02] transition-all duration-500 shadow-md hover:shadow-[0_0_30px_rgba(155,48,255,0.3)] block"
          >
            <app-stained-glass
              [density]="item.density"
              [speed]="item.speed || 1.5"
              [palette]="item.palette || []"
              class="absolute inset-0 z-0"
            >
            </app-stained-glass>

            <div
              class="relative z-10 w-full h-full flex flex-col justify-end p-5 bg-linear-to-t from-black/90 via-black/20 to-transparent"
            >
              <p
                class="text-sm font-bold text-white tracking-[0.15em] uppercase truncate drop-shadow-[0_0_8px_rgba(255,255,255,0.4)]"
              >
                {{ item.name }}
              </p>
              <p class="text-[10px] text-[#9370DB] mt-1 font-mono tracking-widest opacity-80">
                EXPERIMENTAL | LIVE
              </p>
            </div>
          </div>
        } @else {
          <app-animation-card
            [data]="item"
            [class]="item.size === 'large' ? 'md:col-span-2 md:row-span-2' : ''"
            class="w-full h-full block"
          >
          </app-animation-card>
        }
      }
    </div>
  </div>
</div>
